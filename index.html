<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParaLog</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { border: 1px solid #ccc; padding: 15px; border-radius: 8px; background: rgba(255,255,255,0.05); }
        .glider-row { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 5px 0; }
        .settings-box { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-top: 30px; border: 1px dashed #555; }
    </style>
</head>
<body>

    <h1>🪂 ParaLog</h1>

    <section id="dashboard">
        <div class="stats-grid">
            <div class="card">
                <small>Total Flights</small>
                <h2 id="stat-total-flights">0</h2>
            </div>
            <div class="card">
                <small>Total Duration</small>
                <h2 id="stat-total-time">0h 0m</h2>
            </div>
        </div>
        <h3>Stats per Glider</h3>
        <div id="glider-stats-container"><p>No data</p></div>
    </section>

    <hr>

    <section id="log-flight">
        <h3>Log Flight</h3>
        <label>Glider</label>
        <select id="glider-select">
            <option value="Ozone Mojo">Ozone Mojo</option>
            <option value="Niviuk Hook">Niviuk Hook</option>
            <option value="Advance Alpha">Advance Alpha</option>
        </select>

        <label>Take-off</label>
        <input type="text" id="takeoff" placeholder="Location" required>

        <label>Distance (km)</label>
        <input type="number" id="distance" placeholder="0">

        <label>Duration</label>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="dur-h" placeholder="Hrs">
            <input type="number" id="dur-m" placeholder="Min">
        </div>
        <button onclick="saveFlight()" style="width: 100%; background: #007bff; color: white;">Save Flight</button>
    </section>

    <section class="settings-box">
        <h3>Initial Offsets</h3>
        <p><small>Enter values from your previous logbooks here:</small></p>
        
        <label>Legacy Flight Count:</label>
        <input type="number" id="legacy-count-input" value="0" oninput="updateSettings()">

        <label>Legacy Hours Offset:</label>
        <input type="number" id="legacy-hours-input" value="0" oninput="updateSettings()">
        
        <button onclick="exportCSV()" style="width: 100%; margin-top: 10px;">Export CSV</button>
    </section>

    <script>
        // Load flights from storage
        let flights = JSON.parse(localStorage.getItem('flights')) || [];

        // Load legacy values from storage on startup
        window.onload = () => {
            document.getElementById('legacy-count-input').value = localStorage.getItem('legacyCount') || 0;
            document.getElementById('legacy-hours-input').value = localStorage.getItem('legacyHours') || 0;
            calculateStats();
        };

        function updateSettings() {
            localStorage.setItem('legacyCount', document.getElementById('legacy-count-input').value || 0);
            localStorage.setItem('legacyHours', document.getElementById('legacy-hours-input').value || 0);
            calculateStats();
        }

        function saveFlight() {
            const takeoff = document.getElementById('takeoff').value;
            if (!takeoff) return alert("Take-off is mandatory");

            const flight = {
                glider: document.getElementById('glider-select').value,
                takeoff: takeoff,
                distance: document.getElementById('distance').value || 0,
                duration: (parseInt(document.getElementById('dur-h').value) || 0) * 60 + 
                          (parseInt(document.getElementById('dur-m').value) || 0),
                date: new Date().toLocaleDateString()
            };

            flights.push(flight);
            localStorage.setItem('flights', JSON.stringify(flights));
            
            // Clear form
            document.getElementById('takeoff').value = "";
            document.getElementById('distance').value = "";
            document.getElementById('dur-h').value = "";
            document.getElementById('dur-m').value = "";
            
            calculateStats();
        }

        function calculateStats() {
            const offsetCount = parseInt(localStorage.getItem('legacyCount')) || 0;
            const offsetHours = parseInt(localStorage.getItem('legacyHours')) || 0;

            const totalFlights = flights.length + offsetCount;
            const totalMinutes = flights.reduce((s, f) => s + f.duration, 0) + (offsetHours * 60);

            document.getElementById('stat-total-flights').innerText = totalFlights;
            document.getElementById('stat-total-time').innerText = 
                `${Math.floor(totalMinutes / 60)}h ${totalMinutes % 60}m`;

            renderGliderTable();
        }

        function renderGliderTable() {
            const stats = {};
            flights.forEach(f => {
                if (!stats[f.glider]) stats[f.glider] = { count: 0, time: 0 };
                stats[f.glider].count++;
                stats[f.glider].time += f.duration;
            });

            let html = "";
            for (const [name, data] of Object.entries(stats)) {
                html += `<div class="glider-row"><span>${name}</span><span>${data.count} fl | ${Math.floor(data.time/60)}h ${data.time%60}m</span></div>`;
            }
            document.getElementById('glider-stats-container').innerHTML = html || "<p>No flights logged</p>";
        }

        function exportCSV() {
            let csv = "Date,Glider,Takeoff,Distance,DurationMin\n";
            flights.forEach(f => csv += `${f.date},${f.glider},${f.takeoff},${f.distance},${f.duration}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'logbook.csv';
            a.click();
        }
    </script>
</body>
</html>
